# druid-broker-runtime.properties -- Druid broker config that
# omits the authenticator chain entirely. Default is allowAll.
druid.service=druid/broker
druid.host=druid-broker
druid.port=8082
druid.zk.service.host=zookeeper:2181

druid.metadata.storage.type=postgresql
druid.broker.cache.useCache=true
druid.processing.numThreads=4
druid.extensions.loadList=["druid-postgresql-metadata-storage","druid-kafka-indexing-service"]
