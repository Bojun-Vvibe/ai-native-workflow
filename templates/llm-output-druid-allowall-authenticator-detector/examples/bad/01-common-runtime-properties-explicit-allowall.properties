# common.runtime.properties -- LLM-generated Druid quickstart
# Explicit allowAll authenticator chain.
druid.service=druid/coordinator
druid.host=druid-coordinator
druid.port=8081
druid.zk.service.host=zk-0:2181

druid.metadata.storage.type=postgresql
druid.extensions.loadList=["postgresql-metadata-storage"]

# Auth: anyone on the network is fully privileged.
druid.auth.authenticatorChain=["allowAll"]
druid.auth.authorizers=["allowAll"]
druid.escalator.type=noop
