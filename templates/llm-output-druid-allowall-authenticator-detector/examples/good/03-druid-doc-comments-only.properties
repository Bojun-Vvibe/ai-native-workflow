# Druid hardening notes
#
# Anti-pattern -- DO NOT do this:
#
#   druid.auth.authenticatorChain=["allowAll"]
#
# That makes every HTTP request fully privileged. Always set the
# chain to a real authenticator from druid-basic-security or
# druid-kerberos. The default is also allowAll, so an empty chain
# is just as bad.
#
# Recommended:
#   druid.auth.authenticatorChain=["MyBasicAuthenticator"]
#
# This file is a doc with the bad pattern only inside `#`
# comments; the detector should not flag it.
