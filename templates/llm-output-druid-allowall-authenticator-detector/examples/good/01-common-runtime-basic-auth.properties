# common.runtime.properties -- safe: chain set to a real
# authenticator from the druid-basic-security extension.
druid.service=druid/coordinator
druid.host=druid-coordinator
druid.port=8081
druid.zk.service.host=zk-0:2181

druid.metadata.storage.type=postgresql
druid.extensions.loadList=["druid-basic-security","postgresql-metadata-storage"]

druid.auth.authenticatorChain=["MyBasicAuthenticator"]
druid.auth.authenticator.MyBasicAuthenticator.type=basic
druid.auth.authenticator.MyBasicAuthenticator.initialAdminPassword={"type":"environment","variable":"DRUID_ADMIN_PASS"}
druid.auth.authenticator.MyBasicAuthenticator.credentialsValidator.type=metadata
druid.auth.authorizers=["MyBasicAuthorizer"]
druid.auth.authorizer.MyBasicAuthorizer.type=basic
druid.escalator.type=basic
druid.escalator.internalClientUsername=druid_system
druid.escalator.internalClientPassword={"type":"environment","variable":"DRUID_SYSTEM_PASS"}
