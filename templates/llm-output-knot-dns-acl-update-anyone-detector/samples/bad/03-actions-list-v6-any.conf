# knot.conf — bad: acl uses the plural `actions:` spelling with
# update in a sequence and address: ::/0 (IPv6 catch-all).
server:
    listen: ::@53

acl:
  - id: v6_update
    address: ::/0
    actions: [transfer, update]

zone:
  - domain: example.org
    file: "/var/lib/knot/example.org.zone"
    acl: v6_update
