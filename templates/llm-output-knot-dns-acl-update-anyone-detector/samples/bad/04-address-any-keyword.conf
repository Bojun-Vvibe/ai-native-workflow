# knot.conf — bad: action: update with the bareword `any` for
# address (Knot accepts this spelling in some example templates).
server:
    listen: 0.0.0.0@53

acl:
  - id: any_update
    address: any
    action: update

zone:
  - domain: dyn.example
    file: "/var/lib/knot/dyn.example.zone"
    acl: any_update
