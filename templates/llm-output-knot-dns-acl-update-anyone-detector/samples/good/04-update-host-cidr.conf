# knot.conf — good: update is granted only to a single host /32.
# Comments below mention `address: 0.0.0.0/0` but only inside a
# `#`-prefixed line, so the comment-stripper should drop it.
#  example bad doc: address: 0.0.0.0/0  action: update
server:
    listen: 0.0.0.0@53

acl:
  - id: dhcp_updater
    address: 192.0.2.7/32
    action: update

zone:
  - domain: lan.example
    file: "/var/lib/knot/lan.example.zone"
    acl: dhcp_updater
