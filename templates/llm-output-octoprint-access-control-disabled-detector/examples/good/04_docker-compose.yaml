version: "3.8"
services:
  octoprint:
    image: octoprint/octoprint:latest
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - OCTOPRINT_ACCESS_CONTROL_ENABLED=true
      - OCTOPRINT_API_KEY_FILE=/run/secrets/octoprint_api_key
    volumes:
      - ./octoprint:/octoprint
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    secrets:
      - octoprint_api_key
secrets:
  octoprint_api_key:
    file: ./secrets/octoprint_api_key.txt
