version: "3.8"
services:
  transmission:
    image: linuxserver/transmission:latest
    ports:
      - "127.0.0.1:9091:9091"
      - "51413:51413"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - TRANSMISSION_RPC_AUTHENTICATION_REQUIRED=true
      - TRANSMISSION_USER=ops
      - TRANSMISSION_PASS_FILE=/run/secrets/transmission_pass
    volumes:
      - ./config:/config
      - ./downloads:/downloads
    secrets:
      - transmission_pass
secrets:
  transmission_pass:
    file: ./secrets/transmission_pass.txt
