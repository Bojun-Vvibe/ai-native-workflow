# good_2: legacy auth_enabled: true (multi-tenant) with overrides
auth_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

overrides:
  defaults:
    ingestion:
      rate_limit_bytes: 15000000

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
