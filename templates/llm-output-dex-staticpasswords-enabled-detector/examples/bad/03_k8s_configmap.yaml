apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
data:
  config.yaml: |
    issuer: https://dex.svc.cluster.local
    storage:
      type: kubernetes
      config:
        inCluster: true
    connectors:
    - type: oidc
      id: corp
      name: Corp
      config:
        issuer: https://idp.corp.local
        clientID: dex
        clientSecret: redacted
    enablePasswordDB: true
    staticPasswords:
    - email: "team@example.com"
      hash: "$2a$10$abcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQR"
      username: "team"
