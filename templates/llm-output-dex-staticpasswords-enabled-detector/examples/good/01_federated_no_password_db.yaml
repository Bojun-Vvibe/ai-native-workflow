# Production dex config: federate to corp OIDC, no local password DB.
issuer: https://login.example.org
storage:
  type: postgres
  config:
    host: dex-db
    port: 5432
    database: dex
    user: dex
    password: $POSTGRES_PASSWORD
    ssl:
      mode: verify-full

connectors:
- type: oidc
  id: corp
  name: Corp SSO
  config:
    issuer: https://idp.corp.local
    clientID: dex
    clientSecret: $CORP_SECRET

enablePasswordDB: false
