apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
spec:
  replicas: 1
  selector:
    matchLabels: { app: portainer }
  template:
    metadata:
      labels: { app: portainer }
    spec:
      containers:
        - name: portainer
          image: portainer/portainer-ce:2.19.4
          args:
            - "--admin-password-file"
            - "/etc/portainer/admin.txt"
          ports:
            - containerPort: 9443
