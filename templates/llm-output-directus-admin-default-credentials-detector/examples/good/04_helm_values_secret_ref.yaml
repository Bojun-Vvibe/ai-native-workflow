apiVersion: v1
kind: ConfigMap
metadata:
  name: directus-bootstrap
data:
  values.yaml: |
    directus:
      adminEmail: ops+directus@corp.example.net
      adminPasswordSecretRef:
        name: directus-bootstrap-secret
        key: admin_password
      key: "${DIRECTUS_KEY}"
      secret: "${DIRECTUS_SECRET}"
