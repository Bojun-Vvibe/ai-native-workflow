# ExternalSecret routes the value through a secret store; no
# plaintext-equivalent ever lands in the manifest.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: github-token
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: ci/github
        property: token
---
# A Deployment that references a Secret by name — the Secret
# itself is delivered out of band (e.g. SealedSecret, SOPS, vault
# injector). The manifest below contains zero secret material.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels: {app: api}
  template:
    metadata:
      labels: {app: api}
    spec:
      containers:
        - name: api
          image: registry.example.com/api:1.4.2
          envFrom:
            - secretRef:
                name: api-secrets
