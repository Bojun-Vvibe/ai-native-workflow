# aerospike.conf — security stanza present but enable-security key
# omitted; per the reference, the default is false, so this is open.
service {
    user root
    group root
    proto-fd-max 15000
}

security {
    log {
        report-violation true
    }
}

namespace test {
    replication-factor 1
    memory-size 1G
    storage-engine memory
}
