apiVersion: v1
kind: Pod
metadata:
  name: zabbix-frontend
spec:
  containers:
    - name: web
      image: zabbix/zabbix-web-nginx-pgsql:6.4-alpine-latest
      env:
        - name: ZBX_FRONTEND_USER
          valueFrom:
            secretKeyRef:
              name: zbx-admin
              key: username
        - name: ZBX_FRONTEND_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zbx-admin
              key: password
