apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - "--http-address=0.0.0.0:4180"
            - "--upstream=http://backend.svc:8080"
            - "--provider=oidc"
            - "--skip-auth-routes=GET=^.*$"
