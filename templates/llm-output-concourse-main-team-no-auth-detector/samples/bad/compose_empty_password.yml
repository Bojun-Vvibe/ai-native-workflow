# docker-compose snippet — local user defined with an empty password.
# Concourse accepts this and the `admin:` (no password) account can
# log in with an empty string.
services:
  web:
    image: concourse/concourse:7.11.2
    command: web
    environment:
      CONCOURSE_EXTERNAL_URL: "https://ci.example.com"
      CONCOURSE_POSTGRES_HOST: pg
      CONCOURSE_POSTGRES_USER: concourse
      CONCOURSE_POSTGRES_DATABASE: atc
      CONCOURSE_ADD_LOCAL_USER: "admin:"
      CONCOURSE_MAIN_TEAM_LOCAL_USER: "admin"
