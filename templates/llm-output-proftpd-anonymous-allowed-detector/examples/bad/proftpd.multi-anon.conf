ServerName "Mirror"
ServerType standalone
Port 21

<Anonymous /var/ftp/pub>
  User ftp
  Group ftp
  UserAlias anonymous ftp
  # No <Limit LOGIN>...DenyAll, no AnonRequirePassword on
  MaxClients 50
  DisplayLogin welcome.msg
</Anonymous>

<Anonymous /var/ftp/incoming>
  User ftp
  Group ftp
  UserAlias anonymous ftp
  <Limit STOR>
    AllowAll
  </Limit>
</Anonymous>
