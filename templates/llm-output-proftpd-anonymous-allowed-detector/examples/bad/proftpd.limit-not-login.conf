ServerName "Lab FTP"
ServerType inetd
Port 21

# Limit block exists, but it does not target LOGIN, so the block
# is still effectively login-open.
<Anonymous ~ftp>
  User ftp
  Group ftp
  UserAlias anonymous ftp
  <Limit READ>
    AllowAll
  </Limit>
  <Limit WRITE>
    DenyAll
  </Limit>
</Anonymous>
