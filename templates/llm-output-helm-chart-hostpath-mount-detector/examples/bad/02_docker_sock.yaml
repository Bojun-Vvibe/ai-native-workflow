apiVersion: v1
kind: Pod
metadata:
  name: bad-docker-sock
spec:
  containers:
    - name: agent
      image: alpine:3.20
      volumeMounts:
        - name: docker
          mountPath: /var/run/docker.sock
  volumes:
    - name: docker
      hostPath:
        path: /var/run/docker.sock
        type: Socket
