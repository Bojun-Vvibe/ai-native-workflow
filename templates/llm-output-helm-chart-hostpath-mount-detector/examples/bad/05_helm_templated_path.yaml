apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-bad-helm
spec:
  containers:
    - name: app
      image: {{ .Values.image }}
      volumeMounts:
        - name: hostdir
          mountPath: /mnt/host
  volumes:
    - name: hostdir
      hostPath:
        path: {{ .Values.hostDir }}
        type: DirectoryOrCreate
