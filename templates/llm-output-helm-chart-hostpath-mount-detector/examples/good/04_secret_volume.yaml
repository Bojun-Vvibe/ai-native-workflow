apiVersion: v1
kind: Pod
metadata:
  name: good-secret-volume
spec:
  containers:
    - name: app
      image: alpine:3.20
      volumeMounts:
        - name: tls
          mountPath: /etc/tls
          readOnly: true
  volumes:
    - name: tls
      secret:
        secretName: app-tls
        defaultMode: 0400
