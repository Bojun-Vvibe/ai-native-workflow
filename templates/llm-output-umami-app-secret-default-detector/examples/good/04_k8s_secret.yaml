apiVersion: v1
kind: Secret
metadata:
  name: umami-app
type: Opaque
stringData:
  APP_SECRET: "Mn4Rt7Yq2Wp8Zx5Vk1Lh3Jb6Cf9Gd0Ks2Pe4Vu7Nw"
  HASH_SALT: "Tx9Hf2Zb6Cw4Vp1Yk8Lr3Mn5Sd7Gj0Qu2Bv8Xa"
  DATABASE_URL: "postgresql://umami_app:strong-db-pw@db.internal/umami"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: umami
spec:
  replicas: 2
  selector:
    matchLabels:
      app: umami
  template:
    metadata:
      labels:
        app: umami
    spec:
      containers:
        - name: umami
          image: ghcr.io/umami-software/umami:postgresql-latest
          envFrom:
            - secretRef:
                name: umami-app
