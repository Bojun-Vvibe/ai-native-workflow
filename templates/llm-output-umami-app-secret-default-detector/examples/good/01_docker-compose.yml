version: "3.8"
services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      HASH_SALT: ${UMAMI_HASH_SALT}
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: umami
      POSTGRES_DB: umami
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
