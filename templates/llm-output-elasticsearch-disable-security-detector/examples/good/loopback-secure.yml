# Loopback dev node with security off -- not an exposure (no exposed
# host) but we still flag because the security-off key itself is the
# anti-pattern we're looking for. Use the suppress mark for legitimate
# local-only sandboxes.
cluster.name: local-dev
node.name: laptop
network.host: 127.0.0.1
http.port: 9200
xpack.security.enabled: true
xpack.security.transport.ssl.enabled: true
xpack.security.http.ssl.enabled: true
xpack.security.transport.ssl.verification_mode: certificate
