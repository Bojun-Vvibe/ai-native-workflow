# connect-distributed.properties with BasicAuth REST extension
bootstrap.servers=broker:9092
group.id=connect-cluster
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
config.storage.topic=connect-configs
offset.storage.topic=connect-offsets
status.storage.topic=connect-status
plugin.path=/usr/share/java

# Listener binds everywhere, but we install the basic-auth REST
# extension and a JAAS file so the API is gated.
listeners=http://0.0.0.0:8083
rest.extension.classes=org.apache.kafka.connect.rest.basic.auth.extension.BasicAuthSecurityRestExtension
listener.name.http.plain.sasl.jaas.config=org.eclipse.jetty.jaas.spi.PropertyFileLoginModule required file="/etc/kafka-connect/rest-credentials.properties";
