# docker-compose.yml -- safe: JobManager fronted by oauth2-proxy.
# REST is on 0.0.0.0 inside the network namespace, but only the
# proxy publishes a port to the host.
version: "3.8"
services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    command:
      - --upstream=http://jobmanager:8081
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --email-domain=*
    ports:
      - "4180:4180"
    depends_on:
      - jobmanager
  jobmanager:
    image: flink:1.18-scala_2.12
    command: jobmanager
    expose:
      - "8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        rest.bind-address: 0.0.0.0
  taskmanager:
    image: flink:1.18-scala_2.12
    command: taskmanager
    depends_on:
      - jobmanager
