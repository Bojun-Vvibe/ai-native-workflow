port 26379
bind 127.0.0.1
# Monitors the master but never sets sentinel auth-pass — Sentinel cannot
# authenticate to a protected master and will mark it as down.
sentinel monitor cache-prod 10.20.30.40 6379 2
sentinel down-after-milliseconds cache-prod 5000
sentinel parallel-syncs cache-prod 1
requirepass s3cretSentinelPassw0rd
