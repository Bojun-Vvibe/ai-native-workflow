# Good sample 3: WEBPASSWORD set to a strong non-hash passphrase
# (some operators set the file directly with a plain password
# before running `pihole -a -p` to hash it).
PIHOLE_INTERFACE=eth0
IPV4_ADDRESS=192.168.1.10/24
PIHOLE_DNS_1=1.1.1.1
QUERY_LOGGING=true
BLOCKING_ENABLED=true
WEBPASSWORD="r7Q!9pLm-3vYx_Kw"
