version: "3.8"
services:
  graphql-engine:
    image: hasura/graphql-engine:v2.36.0
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://app:app@db:5432/app
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: "kf83hd-very-long-random-secret-9d8f7a"
  db:
    image: postgres:15
