apiVersion: apps/v1
kind: Deployment
metadata:
  name: hasura
spec:
  replicas: 1
  selector:
    matchLabels: { app: hasura }
  template:
    metadata:
      labels: { app: hasura }
    spec:
      containers:
        - name: graphql-engine
          image: hasura/graphql-engine:v2.36.0
          ports:
            - containerPort: 8080
          env:
            - name: HASURA_GRAPHQL_DATABASE_URL
              valueFrom:
                secretKeyRef: { name: hasura-db, key: url }
            - name: HASURA_GRAPHQL_ENABLE_CONSOLE
              value: "false"
            - name: HASURA_GRAPHQL_ADMIN_SECRET
              valueFrom:
                secretKeyRef: { name: hasura-admin, key: secret }
