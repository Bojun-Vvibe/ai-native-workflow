version: "3.9"
services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BASE_URL: "https://search.example.test/"
      # Pulled from the host's secrets file at compose time.
      SEARXNG_SECRET_KEY: "${SEARXNG_SECRET_KEY_FROM_HOST}"
      SEARXNG_REDIS_URL: "redis://redis:6379/0"
