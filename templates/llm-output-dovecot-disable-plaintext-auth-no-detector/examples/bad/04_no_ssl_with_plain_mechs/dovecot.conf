protocols = imap
listen = *
mail_location = maildir:~/Maildir

# ssl is left at the Dovecot default ("yes" — TLS is offered but
# not required). Combined with plain/login auth_mechanisms and no
# explicit ssl=required or disable_plaintext_auth=yes, this is a
# typical "starter config" emitted by an LLM that downgrades the
# hardened defaults without saying so.
ssl = yes
auth_mechanisms = plain login

service imap-login {
    inet_listener imap {
        port = 143
    }
}
