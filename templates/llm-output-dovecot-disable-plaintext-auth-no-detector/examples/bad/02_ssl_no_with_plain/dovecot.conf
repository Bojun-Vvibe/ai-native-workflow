protocols = imap
listen = *
mail_location = maildir:~/Maildir

# Author turned SSL off "for now" while keeping plain/login auth
# advertised. Default disable_plaintext_auth=yes is now meaningless
# because there is no TLS to gate plaintext on.
ssl = no
auth_mechanisms = plain login

service imap-login {
    inet_listener imap {
        port = 143
    }
}
