protocols = imap pop3
listen = *, ::
mail_location = maildir:~/Maildir

ssl = required
ssl_cert = </etc/dovecot/cert.pem
ssl_key = </etc/dovecot/key.pem

# "Make Thunderbird happy" answer pasted from a help thread.
disable_plaintext_auth = no
auth_mechanisms = plain login

service imap-login {
    inet_listener imap {
        port = 143
    }
}
