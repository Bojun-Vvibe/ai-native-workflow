# Pure passdb/userdb fragment under conf.d/. Contains no top-level
# server-identity directives (protocols=, listen=, mail_location=,
# service imap-login/pop3-login), so this file should not be
# flagged — the global config is the source of truth.
passdb {
    driver = pam
    args = dovecot
}

userdb {
    driver = passwd
}

namespace inbox {
    inbox = yes
    separator = /
}
