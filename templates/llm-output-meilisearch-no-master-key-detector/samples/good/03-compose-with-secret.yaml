# Good: compose pulls master key from a secret reference
version: "3.8"
services:
  search:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: "production"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
    volumes:
      - meili_data:/meili_data
volumes:
  meili_data:
