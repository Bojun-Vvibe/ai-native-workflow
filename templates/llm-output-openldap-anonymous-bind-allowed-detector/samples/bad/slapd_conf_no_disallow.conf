# Legacy slapd.conf with no `disallow bind_anon` and no `require authc`.
# A LLM emitted this when asked "give me a working slapd.conf for an
# internal directory". Anonymous bind is left enabled — anyone on the
# network can `ldapsearch -x` the whole tree.

include     /etc/openldap/schema/core.schema
include     /etc/openldap/schema/cosine.schema
include     /etc/openldap/schema/inetorgperson.schema

pidfile     /var/run/openldap/slapd.pid
argsfile    /var/run/openldap/slapd.args

database    mdb
suffix      "dc=example,dc=org"
rootdn      "cn=admin,dc=example,dc=org"
rootpw      {SSHA}placeholder
directory   /var/lib/openldap/openldap-data

access to *
    by self write
    by users read
    by * read
