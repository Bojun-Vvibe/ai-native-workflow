# Legacy slapd.conf using `require authc` on the database to force a
# real bind for any operation. This is functionally equivalent to
# `disallow bind_anon` for the purposes of this detector.

include     /etc/openldap/schema/core.schema

pidfile     /var/run/openldap/slapd.pid
argsfile    /var/run/openldap/slapd.args

database    mdb
suffix      "dc=example,dc=org"
rootdn      "cn=admin,dc=example,dc=org"
rootpw      {SSHA}placeholder
directory   /var/lib/openldap/openldap-data
require     authc

access to *
    by self write
    by users read
    by * none
