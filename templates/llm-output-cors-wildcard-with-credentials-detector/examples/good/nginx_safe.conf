# nginx: public CDN-style read-only API. Wildcard origin only,
# credentials NOT enabled. Safe.
server {
    listen 443 ssl;
    server_name cdn.example.test;

    location /assets/ {
        add_header Access-Control-Allow-Origin "*" always;
        # Intentionally no Access-Control-Allow-Credentials header.
        try_files $uri =404;
    }
}

