version: "3.8"
services:
  authelia:
    image: authelia/authelia:4.38
    environment:
      # _FILE variants pull material from a mounted secrets file at
      # startup, so no placeholder ever sits on disk in the repo.
      AUTHELIA_JWT_SECRET_FILE: /run/secrets/authelia_jwt
      AUTHELIA_SESSION_SECRET_FILE: /run/secrets/authelia_session
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /run/secrets/authelia_storage
    secrets:
      - authelia_jwt
      - authelia_session
      - authelia_storage
