# vault-disable-mlock-allowed
# This compose file targets a serverless runtime that cannot grant
# IPC_LOCK; the team has separately disabled swap and core dumps and
# audited the trade-off. Suppression is documented in ADR-0042.

version: "3.8"
services:
  vault:
    image: hashicorp/vault:1.16
    environment:
      - VAULT_ADDR=https://0.0.0.0:8200
      - VAULT_DISABLE_MLOCK=true
    ports:
      - "8200:8200"
    command: server -config=/vault/config/vault.hcl
