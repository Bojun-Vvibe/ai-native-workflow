version: "3.8"
services:
  guacd:
    image: guacamole/guacd:1.5.5
  guacamole:
    image: guacamole/guacamole:1.5.5
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: db
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacadmin
      MYSQL_PASSWORD: guacadmin
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
