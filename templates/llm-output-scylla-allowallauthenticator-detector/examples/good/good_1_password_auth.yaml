# Properly secured scylla.yaml
cluster_name: 'prod'
num_tokens: 256
endpoint_snitch: GossipingPropertyFileSnitch

listen_address: 10.0.5.12
broadcast_rpc_address: 10.0.5.12
rpc_port: 9042

# auth - PasswordAuthenticator + CassandraAuthorizer
authenticator: PasswordAuthenticator
authorizer: CassandraAuthorizer
role_manager: CassandraRoleManager

server_encryption_options:
  internode_encryption: all
  keystore: /etc/scylla/keystore.jks

client_encryption_options:
  enabled: true
  keystore: /etc/scylla/client-keystore.jks
