# good: TLS listener with JWT auth-token and cert-auth on
[Service]
ExecStart=/usr/local/bin/etcd \
  --name=etcd-jwt \
  --data-dir=/var/lib/etcd \
  --listen-client-urls=https://10.0.0.6:2379 \
  --advertise-client-urls=https://10.0.0.6:2379 \
  --cert-file=/etc/etcd/server.crt \
  --key-file=/etc/etcd/server.key \
  --trusted-ca-file=/etc/etcd/ca.crt \
  --client-cert-auth=true \
  --auth-token=jwt,pub-key=/etc/etcd/jwt.pub,priv-key=/etc/etcd/jwt.key,sign-method=RS256,ttl=10m
