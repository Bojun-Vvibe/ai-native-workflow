apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger-collector
spec:
  template:
    spec:
      containers:
        - name: collector
          image: jaegertracing/jaeger-collector:1.57
          args:
            - "--collector.grpc-server.host-port=127.0.0.1:14250"
