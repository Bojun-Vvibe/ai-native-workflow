apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
spec:
  type: LoadBalancer
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: jaeger-grpc
      port: 14250
      targetPort: 14250
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger-collector
spec:
  template:
    spec:
      containers:
        - name: collector
          image: jaegertracing/jaeger-collector:1.57
