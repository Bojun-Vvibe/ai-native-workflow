; sample tox-ish ini that an LLM stitched together; sections repeat
[tox]
envlist = py311

[testenv]
deps = pytest
commands = pytest

[testenv:lint]
deps = ruff
commands = ruff check .

[testenv]
deps = pytest-cov
commands = pytest --cov

[flake8]
max-line-length = 100

[flake8]
extend-ignore = E203
