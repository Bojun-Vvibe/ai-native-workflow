# /etc/arangodb3/arangod.conf  (excerpt)
[database]
directory = /var/lib/arangodb3

[server]
endpoint = tcp://0.0.0.0:8529
authentication = true
storage-engine = rocksdb

[ldap]
# enable_ldap_authentication = true would attach an LDAP backend.
# server-side notes about authentication go in this comment block.
enabled = false
