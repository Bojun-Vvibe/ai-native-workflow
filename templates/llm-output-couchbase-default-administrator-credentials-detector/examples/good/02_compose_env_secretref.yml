version: "3.8"
services:
  db:
    image: couchbase/server:7.6.0
    ports:
      - "8091:8091"
    environment:
      COUCHBASE_ADMINISTRATOR_USERNAME: Administrator
      COUCHBASE_ADMINISTRATOR_PASSWORD_FILE: /run/secrets/cb_admin_pw
    secrets:
      - cb_admin_pw
secrets:
  cb_admin_pw:
    external: true
