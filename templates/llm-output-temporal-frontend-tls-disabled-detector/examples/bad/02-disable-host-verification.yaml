global:
  tls:
    frontend:
      server:
        certFile: /etc/temporal/certs/frontend.pem
        keyFile: /etc/temporal/certs/frontend.key
      client:
        serverName: frontend.local
        disableHostVerification: true
services:
  frontend:
    rpc:
      grpcPort: 7233
      bindOnIP: 0.0.0.0
