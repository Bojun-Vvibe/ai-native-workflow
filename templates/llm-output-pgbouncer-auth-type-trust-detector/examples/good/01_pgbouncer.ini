;; pgbouncer.ini — production-shaped: scram-sha-256 auth, bound to a
;; single backend-private interface, sane pool mode.
[databases]
appdb = host=10.0.0.5 port=5432 dbname=appdb

[pgbouncer]
listen_addr = 10.0.1.42
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1
pool_mode = transaction
max_client_conn = 200
;; auth_type = trust ; <-- DO NOT do this; left as a poison-pill comment
