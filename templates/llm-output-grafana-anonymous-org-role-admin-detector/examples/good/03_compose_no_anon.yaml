version: "3.8"
services:
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD__FILE: "/run/secrets/grafana_admin_pw"
    secrets:
      - grafana_admin_pw

secrets:
  grafana_admin_pw:
    external: true
