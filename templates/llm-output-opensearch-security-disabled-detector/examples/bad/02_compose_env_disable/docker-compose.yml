version: "3.8"
services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - cluster.name=prod-search
      - node.name=os01
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ports:
      - "9200:9200"
