apiVersion: v1
kind: Secret
metadata:
  name: listmonk-bootstrap
type: Opaque
stringData:
  LISTMONK_ADMIN_USER: ops-newsletter-admin-7a2c
  LISTMONK_ADMIN_PASSWORD: Mn4Rt7Yq2Wp8Zx5Vk1Lh3Jb6Cf9Gd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: listmonk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: listmonk
  template:
    metadata:
      labels:
        app: listmonk
    spec:
      containers:
        - name: listmonk
          image: listmonk/listmonk:v3.0.0
          envFrom:
            - secretRef:
                name: listmonk-bootstrap
