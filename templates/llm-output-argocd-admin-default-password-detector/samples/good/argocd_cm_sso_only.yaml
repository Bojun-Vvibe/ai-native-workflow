apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: https://argocd.example.com
  # local admin disabled — SSO via OIDC only
  admin.enabled: "false"
  oidc.config: |
    name: corp-sso
    issuer: https://sso.example.com
    clientID: argocd
    requestedScopes: ["openid", "profile", "email", "groups"]
