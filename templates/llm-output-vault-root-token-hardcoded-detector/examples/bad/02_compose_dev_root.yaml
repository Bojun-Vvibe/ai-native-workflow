version: "3.8"
services:
  vault-dev:
    image: hashicorp/vault:1.15
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
  app:
    image: example/app:latest
    environment:
      VAULT_ADDR: http://vault-dev:8200
      VAULT_TOKEN: myroot
