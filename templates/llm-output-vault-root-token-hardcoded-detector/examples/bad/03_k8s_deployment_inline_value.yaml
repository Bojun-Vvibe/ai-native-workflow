apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-syncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-syncer
  template:
    metadata:
      labels:
        app: secret-syncer
    spec:
      containers:
        - name: syncer
          image: example/secret-syncer:1.4.2
          env:
            - name: VAULT_ADDR
              value: https://vault.svc.cluster.local:8200
            - name: VAULT_TOKEN
              value: hvs.AAAAAAAAAAAAAAAAAAAAAAAA1234567890abcdef
            - name: LOG_LEVEL
              value: info
