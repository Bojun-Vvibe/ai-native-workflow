# /etc/miniflux.conf -- CREATE_ADMIN intentionally OFF.
# Operator runs `miniflux -create-admin` once interactively after
# the first migration, then comments this whole block back out.
DATABASE_URL=postgres://miniflux:${MINIFLUX_DB_PASS}@db/miniflux?sslmode=require
RUN_MIGRATIONS=1
LISTEN_ADDR=127.0.0.1:8080
POLLING_FREQUENCY=60
FETCHER_TIMEOUT=30
