apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: my-cluster
spec:
  kafka:
    replicas: 3
    listeners:
      - name: ingress
        port: 9094
        type: ingress
        tls: true
        configuration:
          bootstrap:
            host: kafka.example.com
  zookeeper:
    replicas: 3
