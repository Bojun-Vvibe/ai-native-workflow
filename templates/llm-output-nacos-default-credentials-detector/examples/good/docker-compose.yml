version: "3.8"
services:
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: nacos-standalone
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_USERNAME=${NACOS_ADMIN_USER}
      - NACOS_AUTH_PASSWORD=${NACOS_ADMIN_PASSWORD}
      - NACOS_AUTH_TOKEN_EXPIRE_SECONDS=18000
    ports:
      - "8848:8848"
