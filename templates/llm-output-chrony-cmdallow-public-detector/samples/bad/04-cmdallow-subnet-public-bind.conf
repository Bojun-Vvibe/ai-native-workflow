# chrony.conf — bad: cmdallow on a real subnet AND control socket
# bound to all interfaces. This is the second classic bad shape:
# the ACL is "scoped" to a /24 but the socket is reachable from
# anywhere on the host's public NICs.
pool pool.ntp.org iburst
driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync

bindcmdaddress 0.0.0.0
cmdallow 192.0.2.0/24
