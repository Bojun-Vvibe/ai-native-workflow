# chrony.conf — good: cmdallow all is overridden by an explicit
# cmddeny all later. (The operator wired the deny in deliberately
# so chronyc commands from the network are refused regardless of
# what an earlier line said.)
pool pool.ntp.org iburst
driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync

cmdallow all
cmddeny all
