apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
spec:
  template:
    spec:
      containers:
        - name: kong
          image: kong/kong-gateway:3.7
          env:
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_ENFORCE_RBAC
              value: "on"
            - name: KONG_ADMIN_GUI_AUTH
              value: "basic-auth"
