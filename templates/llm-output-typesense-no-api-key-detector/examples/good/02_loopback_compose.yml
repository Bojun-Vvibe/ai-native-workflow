version: "3.8"
services:
  search:
    image: typesense/typesense:0.25.2
    # bound to loopback only; reverse proxy in front handles auth + TLS
    ports:
      - "127.0.0.1:8108:8108"
    environment:
      TYPESENSE_API_KEY: "Z6jp9Yb3tLk2QvR8sEwUaH4xN7mC1dF0"
      TYPESENSE_DATA_DIR: /data
    volumes:
      - ts-data:/data
volumes:
  ts-data:
