version: '3'
services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v2.4.0
    environment:
      WOODPECKER_HOST: https://ci.internal.example.org
      WOODPECKER_OPEN: "true"
      WOODPECKER_AGENT_SECRET: ""
      WOODPECKER_GITEA: "true"
      WOODPECKER_GITEA_URL: https://git.internal.example.org
    ports:
      - "8000:8000"
      - "9000:9000"
  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v2.4.0
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: ""
