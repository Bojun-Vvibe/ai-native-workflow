# systemd drop-in for the kubelet that passes --anonymous-auth=true on
# the command line. The flag overrides whatever the --config file says.
[Service]
Environment="KUBELET_EXTRA_ARGS=--anonymous-auth=true --authorization-mode=AlwaysAllow"
ExecStart=
ExecStart=/usr/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_EXTRA_ARGS
