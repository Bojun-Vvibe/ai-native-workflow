# KubeletConfiguration with anonymous explicitly disabled and the
# read-only port pinned to 0. Webhook auth + node authorizer mode
# matches the kubeadm-generated default.
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
authentication:
  anonymous:
    enabled: false
  webhook:
    enabled: true
  x509:
    clientCAFile: /etc/kubernetes/pki/ca.crt
authorization:
  mode: Webhook
readOnlyPort: 0
clusterDNS:
  - 10.96.0.10
clusterDomain: cluster.local
