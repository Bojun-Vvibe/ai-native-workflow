# systemd drop-in for kubelet that explicitly disables anonymous auth
# on the command line.
[Service]
Environment="KUBELET_EXTRA_ARGS=--anonymous-auth=false --read-only-port=0 --authorization-mode=Webhook"
ExecStart=
ExecStart=/usr/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_EXTRA_ARGS
