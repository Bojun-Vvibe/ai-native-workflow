# Auth0 OIDC fronting Chronograf.
version: "3.8"
services:
  chronograf:
    image: chronograf:1.10
    ports:
      - "8888:8888"
    environment:
      TOKEN_SECRET: ${TOKEN_SECRET}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_DOMAIN: example.auth0.com
