# kong.conf — Admin API disabled entirely (declarative DB-less mode
# managed only by mounting kong.yml and restarting the container).
# Documentation reminder: never set admin_listen = 0.0.0.0:8001
# on a public-facing node.
admin_listen = off
proxy_listen = 0.0.0.0:8000, 0.0.0.0:8443 ssl
database = off
declarative_config = /etc/kong/kong.yml
