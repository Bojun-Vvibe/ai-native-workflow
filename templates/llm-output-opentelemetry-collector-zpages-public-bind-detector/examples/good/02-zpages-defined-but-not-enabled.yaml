receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:

exporters:
  debug:
    verbosity: basic

# zpages component is *defined* but not enabled in the service
# pipeline -- the collector will not start it. Detector should
# stay silent.
extensions:
  zpages:
    endpoint: 0.0.0.0:55679
  health_check:
    endpoint: 127.0.0.1:13133

service:
  extensions:
    - health_check
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
