; Legacy 2.4-era template still emitted by older docs.
port 1194
proto udp
dev tun
ca ca.crt
cert server.crt
key server.key
dh dh2048.pem
server 10.8.0.0 255.255.255.0
   client-to-client
client-cert-not-required
auth-user-pass-verify /etc/openvpn/checkpass.sh via-env
script-security 3
username-as-common-name
keepalive 10 120
cipher AES-256-GCM
verb 3
