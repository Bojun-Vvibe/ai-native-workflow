# Good: anonymous on for browser quickstart, BUT API key auth is
# also enabled — read-only public access mediated by allowlist.
# FAKE key value, marked EXAMPLE_PASSWORD_DO_NOT_USE.
version: '3.4'
services:
  weaviate:
    image: semitechnologies/weaviate:1.24.10
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: 'EXAMPLE_PASSWORD_DO_NOT_USE_rotate_me'
      AUTHENTICATION_APIKEY_USERS: 'reader@example.com'
      AUTHORIZATION_ADMINLIST_ENABLED: 'true'
      AUTHORIZATION_ADMINLIST_USERS: 'admin@example.com'
