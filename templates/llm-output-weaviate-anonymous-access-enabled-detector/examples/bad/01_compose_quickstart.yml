# Bad: docker-compose copied verbatim from upstream Weaviate quickstart.
# Anonymous access on, no API key module, no OIDC module. Anyone who
# can reach :8080 can read and write the full schema.
version: '3.4'
services:
  weaviate:
    image: semitechnologies/weaviate:1.24.10
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
