# Legacy-client gateway behind a separate firewall — operator opted in.
server {
    listen 4443 ssl;
    server_name legacy.example.test;

    ssl_certificate     /etc/ssl/legacy.crt;
    ssl_certificate_key /etc/ssl/legacy.key;

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2; # llm-tls-legacy-ok

    location / {
        proxy_pass http://legacy-backend;
    }
}
