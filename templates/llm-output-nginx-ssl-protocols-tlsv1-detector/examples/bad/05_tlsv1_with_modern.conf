server {
    listen 8443 ssl;
    server_name internal.example.test;

    ssl_certificate     /etc/pki/tls/internal.crt;
    ssl_certificate_key /etc/pki/tls/internal.key;

    # Common LLM autocomplete: TLSv1 sneaks in alongside the modern ones.
    ssl_protocols TLSv1 TLSv1.2 TLSv1.3;

    location /metrics {
        return 200 "ok";
    }
}
