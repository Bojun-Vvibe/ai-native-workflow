# Reverse proxy that copy-pasted a 2017 ssl_protocols line.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name proxy.example.test;

    ssl_certificate     /etc/letsencrypt/live/proxy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proxy/privkey.pem;

    ssl_protocols TLSv1.1 TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://upstream:8080;
        proxy_set_header Host $host;
    }
}
