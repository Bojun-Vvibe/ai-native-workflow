# Pure drop-in fragment under sshd_config.d/ that only carves out a
# narrower rule for an automation user. It does NOT contain any
# top-level server-identity directives (Port, ListenAddress, HostKey,
# AuthorizedKeysFile, Subsystem, HostKeyAlgorithms), so the global
# config remains the source of truth and this file should not be
# flagged.
Match User ci-bot Address 10.0.0.0/8
    AuthenticationMethods publickey
    PasswordAuthentication no
    PermitTTY no
    ForceCommand /usr/local/bin/ci-runner
